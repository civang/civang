<svg viewBox="0 0 1200 480" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Night rooftop scene — a silhouetted figure reads a book while two glowing skeletal fish arc through the sky">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#04060f"/>
      <stop offset="55%" stop-color="#0c1631"/>
      <stop offset="85%" stop-color="#172b57"/>
      <stop offset="100%" stop-color="#1d3566"/>
    </linearGradient>
    <linearGradient id="fishBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fffdf2"/>
      <stop offset="60%" stop-color="#f3ead0"/>
      <stop offset="100%" stop-color="#e8d9ae"/>
    </linearGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="9"/>
    </filter>
    <filter id="soft2" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <style>
      .tw1 { animation: tw 3.2s ease-in-out infinite; }
      .tw2 { animation: tw 4.4s ease-in-out 1.2s infinite; }
      .tw3 { animation: tw 5.6s ease-in-out 2.4s infinite; }
      @keyframes tw { 0%,100% { opacity: .95; } 50% { opacity: .2; } }
      .pulse { animation: pulse 6s ease-in-out infinite; }
      @keyframes pulse { 0%,100% { opacity: .30; } 50% { opacity: .5; } }
    </style>
  </defs>

  <!-- ===== sky ===== -->
  <rect width="1200" height="480" fill="url(#sky)"/>

  <!-- ===== stars ===== -->
  <g fill="#ffffff">
    <circle class="tw1" cx="60"   cy="50"  r="1.6"/>
    <circle class="tw2" cx="140"  cy="120" r="1.1"/>
    <circle class="tw3" cx="215"  cy="40"  r="1.3"/>
    <circle class="tw1" cx="330"  cy="150" r="1.0"/>
    <circle class="tw2" cx="395"  cy="60"  r="1.5"/>
    <circle class="tw3" cx="470"  cy="180" r="1.0"/>
    <circle class="tw1" cx="520"  cy="40"  r="1.2"/>
    <circle class="tw2" cx="600"  cy="30"  r="1.7"/>
    <circle class="tw3" cx="662"  cy="120" r="1.0"/>
    <circle class="tw1" cx="700"  cy="55"  r="1.3"/>
    <circle class="tw2" cx="805"  cy="150" r="1.1"/>
    <circle class="tw3" cx="860"  cy="45"  r="1.5"/>
    <circle class="tw1" cx="945"  cy="110" r="1.2"/>
    <circle class="tw2" cx="1030" cy="60"  r="1.4"/>
    <circle class="tw3" cx="1105" cy="140" r="1.1"/>
    <circle class="tw1" cx="1160" cy="40"  r="1.6"/>
    <circle class="tw2" cx="90"   cy="220" r="1.0"/>
    <circle class="tw3" cx="260"  cy="260" r="1.0"/>
    <circle class="tw1" cx="540"  cy="140" r="0.9"/>
    <circle class="tw2" cx="760"  cy="240" r="1.0"/>
    <circle class="tw3" cx="1000" cy="230" r="1.0"/>
    <circle class="tw1" cx="1140" cy="260" r="0.9"/>
    <circle class="tw2" cx="420"  cy="240" r="0.9"/>
    <circle class="tw3" cx="180"  cy="180" r="1.2"/>
  </g>

  <!-- ===== city skyline ===== -->
  <g fill="#0a0f24">
    <rect x="0"    y="356" width="70"  height="90"/>
    <rect x="80"   y="336" width="55"  height="110"/>
    <rect x="150"  y="370" width="90"  height="76"/>
    <rect x="255"  y="330" width="48"  height="116"/>
    <rect x="315"  y="360" width="75"  height="86"/>
    <rect x="400"  y="342" width="60"  height="104"/>
    <rect x="470"  y="372" width="85"  height="74"/>
    <rect x="640"  y="366" width="80"  height="80"/>
    <rect x="730"  y="338" width="52"  height="108"/>
    <rect x="795"  y="362" width="88"  height="84"/>
    <rect x="895"  y="332" width="58"  height="114"/>
    <rect x="965"  y="368" width="82"  height="78"/>
    <rect x="1060" y="344" width="62"  height="102"/>
    <rect x="1132" y="366" width="68"  height="80"/>
  </g>
  <g fill="#060a18">
    <rect x="30"   y="392" width="110" height="56"/>
    <rect x="170"  y="404" width="130" height="44"/>
    <rect x="330"  y="396" width="120" height="52"/>
    <rect x="480"  y="408" width="100" height="40"/>
    <rect x="620"  y="400" width="140" height="48"/>
    <rect x="790"  y="408" width="120" height="40"/>
    <rect x="930"  y="396" width="130" height="52"/>
    <rect x="1080" y="404" width="120" height="44"/>
  </g>
  <!-- lit windows -->
  <g opacity=".9">
    <rect x="95"   y="350" width="4" height="3" fill="#ffd98a"/>
    <rect x="105"  y="362" width="4" height="3" fill="#7fe3ff"/>
    <rect x="270"  y="345" width="4" height="3" fill="#ffd98a"/>
    <rect x="282"  y="358" width="4" height="3" fill="#ff9a6b"/>
    <rect x="415"  y="356" width="4" height="3" fill="#ffd98a"/>
    <rect x="430"  y="370" width="4" height="3" fill="#7fe3ff"/>
    <rect x="745"  y="352" width="4" height="3" fill="#ffd98a"/>
    <rect x="758"  y="366" width="4" height="3" fill="#ff9a6b"/>
    <rect x="910"  y="346" width="4" height="3" fill="#7fe3ff"/>
    <rect x="922"  y="360" width="4" height="3" fill="#ffd98a"/>
    <rect x="1075" y="358" width="4" height="3" fill="#ffd98a"/>
    <rect x="1090" y="372" width="4" height="3" fill="#7fe3ff"/>
    <rect x="60"   y="404" width="3" height="3" fill="#ffd98a"/>
    <rect x="210"  y="414" width="3" height="3" fill="#7fe3ff"/>
    <rect x="360"  y="408" width="3" height="3" fill="#ff9a6b"/>
    <rect x="660"  y="412" width="3" height="3" fill="#ffd98a"/>
    <rect x="850"  y="416" width="3" height="3" fill="#7fe3ff"/>
    <rect x="990"  y="410" width="3" height="3" fill="#ffd98a"/>
    <circle cx="920" cy="326" r="2" fill="#ff5252" class="tw1"/>
    <circle cx="278" cy="324" r="2" fill="#ff5252" class="tw3"/>
  </g>

  <!-- ===== INDOOR FISH ===== -->
  <!-- left fish -->
  <g>
    <path d="M 632 104 C 430 24, 152 92, 142 242 C 137 334, 232 368, 302 332"
          fill="none" stroke="#fffbe8" stroke-width="52" stroke-linecap="round" filter="url(#soft)" class="pulse"/>
    <path d="M 632 104 C 430 24, 152 92, 142 242 C 137 334, 232 368, 302 332"
          fill="none" stroke="url(#fishBody)" stroke-width="30" stroke-linecap="round"/>
    <!-- vertebra notches -->
    <path d="M 632 104 C 430 24, 152 92, 142 242 C 137 334, 232 368, 302 332"
          fill="none" stroke="#0c1631" stroke-width="34" stroke-dasharray="3 17" stroke-opacity=".55"/>
    <!-- tail fin -->
    <path d="M 632 104 L 668 78 L 655 106 L 674 122 Z" fill="#e8d089"/>
    <!-- side fins -->
    <path d="M 205 118 L 172 92 L 190 126 Z" fill="#e8d089"/>
    <path d="M 148 290 L 112 302 L 150 312 Z" fill="#e8d089"/>
    <!-- head -->
    <g transform="translate(302,332) rotate(-24)">
      <ellipse cx="12" cy="0" rx="30" ry="17" fill="url(#fishBody)"/>
      <path d="M 38 -4 L 52 0 L 38 7 Z" fill="#0c1631"/>
      <circle cx="16" cy="-5" r="3.4" fill="#8c1d1d"/>
    </g>
  </g>

  <!-- right fish -->
  <g>
    <path d="M 568 104 C 770 24, 1048 92, 1058 242 C 1063 340, 962 380, 892 340"
          fill="none" stroke="#fffbe8" stroke-width="52" stroke-linecap="round" filter="url(#soft)" class="pulse"/>
    <path d="M 568 104 C 770 24, 1048 92, 1058 242 C 1063 340, 962 380, 892 340"
          fill="none" stroke="url(#fishBody)" stroke-width="30" stroke-linecap="round"/>
    <path d="M 568 104 C 770 24, 1048 92, 1058 242 C 1063 340, 962 380, 892 340"
          fill="none" stroke="#0c1631" stroke-width="34" stroke-dasharray="3 17" stroke-opacity=".55"/>
    <path d="M 568 104 L 532 78 L 545 106 L 526 122 Z" fill="#e8d089"/>
    <path d="M 995 118 L 1028 92 L 1010 126 Z" fill="#e8d089"/>
    <path d="M 1052 290 L 1088 302 L 1050 312 Z" fill="#e8d089"/>
    <g transform="translate(892,340) rotate(204)">
      <ellipse cx="12" cy="0" rx="30" ry="17" fill="url(#fishBody)"/>
      <path d="M 38 -4 L 52 0 L 38 7 Z" fill="#0c1631"/>
      <circle cx="16" cy="5" r="3.4" fill="#8c1d1d"/>
    </g>
  </g>

  <!-- ===== the reader, silhouetted ===== -->
  <g fill="#03040a">
    <!-- head -->
    <circle cx="600" cy="204" r="17"/>
    <path d="M 585 196 L 580 184 L 592 190 L 598 180 L 604 190 L 616 184 L 613 197 Z"/>
    <!-- neck + coat -->
    <path d="M 590 218 L 610 218 L 618 226 C 638 232, 646 246, 645 262 L 638 330
             L 634 356 L 630 356 L 628 330 L 618 332 L 582 332 L 572 330 L 570 356 L 566 356 L 562 330
             L 555 262 C 554 246, 562 232, 582 226 Z"/>
    <!-- right arm raised with book -->
    <path d="M 634 240 C 648 236, 656 228, 660 220 L 668 226 C 662 238, 652 248, 638 252 Z"/>
    <!-- legs -->
    <path d="M 582 332 L 598 332 L 596 446 L 584 446 Z"/>
    <path d="M 602 332 L 618 332 L 616 446 L 604 446 Z"/>
    <!-- feet -->
    <rect x="580" y="443" width="20" height="6" rx="2"/>
    <rect x="602" y="443" width="20" height="6" rx="2"/>
  </g>
  <!-- the book, glowing pages -->
  <g transform="translate(668,214) rotate(-12)">
    <path d="M 0 0 L 22 -8 L 22 16 L 0 22 Z" fill="#fdf8e4" filter="url(#soft2)"/>
    <path d="M 0 0 L -22 -8 L -22 16 L 0 22 Z" fill="#efe6c6" filter="url(#soft2)"/>
    <path d="M 0 0 L 22 -8 L 22 16 L 0 22 Z" fill="#fdf8e4"/>
    <path d="M 0 0 L -22 -8 L -22 16 L 0 22 Z" fill="#efe6c6"/>
    <g stroke="#9b8f6a" stroke-width="1">
      <line x1="4"  y1="4"  x2="17" y2="0"/>
      <line x1="4"  y1="9"  x2="17" y2="5"/>
      <line x1="4"  y1="14" x2="17" y2="10"/>
      <line x1="-4" y1="4"  x2="-17" y2="0"/>
      <line x1="-4" y1="9"  x2="-17" y2="5"/>
      <line x1="-4" y1="14" x2="-17" y2="10"/>
    </g>
  </g>

  <!-- ===== rooftop ledge ===== -->
  <rect x="0" y="446" width="1200" height="8" fill="#0e3d44"/>
  <rect x="0" y="446" width="1200" height="2" fill="#2fd4c8" opacity=".55"/>
  <rect x="0" y="454" width="1200" height="26" fill="#04070d"/>
  <g stroke="#123f47" stroke-width="1" opacity=".6">
    <line x1="100"  y1="454" x2="90"   y2="480"/>
    <line x1="300"  y1="454" x2="292"  y2="480"/>
    <line x1="500"  y1="454" x2="494"  y2="480"/>
    <line x1="700"  y1="454" x2="706"  y2="480"/>
    <line x1="900"  y1="454" x2="908"  y2="480"/>
    <line x1="1100" y1="454" x2="1110" y2="480"/>
  </g>
</svg>
