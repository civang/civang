<svg viewBox="0 0 1200 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Shivang Dutta — anime night-sky banner">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b1026"/>
      <stop offset="45%" stop-color="#1b2350"/>
      <stop offset="75%" stop-color="#4a3a7a"/>
      <stop offset="100%" stop-color="#b3628f"/>
    </linearGradient>
    <radialGradient id="moonGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff7d6" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#ffe9a8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ffe9a8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="mount1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2150"/>
      <stop offset="100%" stop-color="#171233"/>
    </linearGradient>
    <linearGradient id="mount2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#171233"/>
      <stop offset="100%" stop-color="#0d0a22"/>
    </linearGradient>
    <style>
      .star { fill: #ffffff; }
      .tw1 { animation: twinkle 3s ease-in-out infinite; }
      .tw2 { animation: twinkle 4s ease-in-out 1s infinite; }
      .tw3 { animation: twinkle 5s ease-in-out 2s infinite; }
      @keyframes twinkle { 0%,100% { opacity: .9; } 50% { opacity: .15; } }
      .cloud { animation: drift 60s linear infinite; }
      .cloud2 { animation: drift 90s linear infinite reverse; }
      @keyframes drift { from { transform: translateX(0); } to { transform: translateX(120px); } }
      .petal { fill: #f6b8d0; opacity: .85; }
      .fall1 { animation: fall 11s linear infinite; }
      .fall2 { animation: fall 14s linear 3s infinite; }
      .fall3 { animation: fall 17s linear 6s infinite; }
      @keyframes fall {
        0%   { transform: translate(0,-30px) rotate(0deg); opacity: 0; }
        10%  { opacity: .9; }
        100% { transform: translate(-140px, 460px) rotate(300deg); opacity: 0; }
      }
      .name { font: 700 64px 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; fill: #f4f1ff; letter-spacing: 6px; }
      .sub  { font: 400 22px 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; fill: #cfc4ee; letter-spacing: 3px; }
      .jp   { font: 400 18px 'Yu Gothic', 'Hiragino Sans', 'Noto Sans JP', sans-serif; fill: #9d8fd0; letter-spacing: 8px; }
    </style>
  </defs>

  <!-- sky -->
  <rect width="1200" height="420" fill="url(#sky)"/>

  <!-- stars -->
  <g>
    <circle class="star tw1" cx="80"  cy="60"  r="1.8"/>
    <circle class="star tw2" cx="180" cy="110" r="1.2"/>
    <circle class="star tw3" cx="260" cy="45"  r="1.5"/>
    <circle class="star tw1" cx="350" cy="90"  r="1.1"/>
    <circle class="star tw2" cx="430" cy="40"  r="1.7"/>
    <circle class="star tw3" cx="520" cy="120" r="1.2"/>
    <circle class="star tw1" cx="640" cy="55"  r="1.4"/>
    <circle class="star tw2" cx="720" cy="100" r="1.1"/>
    <circle class="star tw3" cx="800" cy="35"  r="1.6"/>
    <circle class="star tw1" cx="905" cy="85"  r="1.2"/>
    <circle class="star tw2" cx="1010" cy="50" r="1.5"/>
    <circle class="star tw3" cx="1100" cy="115" r="1.3"/>
    <circle class="star tw1" cx="1160" cy="60" r="1.7"/>
    <circle class="star tw2" cx="60"  cy="160" r="1.1"/>
    <circle class="star tw3" cx="300" cy="170" r="1.3"/>
    <circle class="star tw1" cx="560" cy="180" r="1.0"/>
    <circle class="star tw2" cx="860" cy="150" r="1.2"/>
    <circle class="star tw3" cx="1130" cy="180" r="1.1"/>
  </g>

  <!-- moon -->
  <circle cx="960" cy="120" r="130" fill="url(#moonGlow)"/>
  <circle cx="960" cy="120" r="58" fill="#fdf3cf"/>
  <circle cx="938" cy="102" r="9" fill="#efe3b8" opacity=".7"/>
  <circle cx="982" cy="138" r="6" fill="#efe3b8" opacity=".6"/>
  <circle cx="960" cy="120" r="58" fill="none" stroke="#fff9e3" stroke-opacity=".5" stroke-width="1.5"/>

  <!-- clouds -->
  <g class="cloud" opacity=".22" fill="#e7ddff">
    <ellipse cx="220" cy="200" rx="120" ry="16"/>
    <ellipse cx="300" cy="188" rx="70" ry="11"/>
  </g>
  <g class="cloud2" opacity=".18" fill="#e7ddff">
    <ellipse cx="760" cy="230" rx="150" ry="14"/>
    <ellipse cx="860" cy="218" rx="80" ry="10"/>
  </g>

  <!-- far mountains -->
  <path d="M0 320 L140 240 L260 310 L390 225 L520 315 L660 245 L800 320 L940 260 L1080 320 L1200 270 L1200 420 L0 420 Z" fill="url(#mount1)"/>
  <!-- near mountains -->
  <path d="M0 370 L170 300 L330 365 L500 295 L680 372 L850 310 L1020 372 L1200 325 L1200 420 L0 420 Z" fill="url(#mount2)"/>

  <!-- torii gate silhouette -->
  <g fill="#0a0718">
    <rect x="118" y="268" width="10" height="92"/>
    <rect x="196" y="268" width="10" height="92"/>
    <rect x="104" y="258" width="116" height="10" rx="2"/>
    <rect x="96"  y="240" width="132" height="13" rx="4"/>
    <rect x="157" y="253" width="10" height="15"/>
  </g>

  <!-- birds -->
  <g stroke="#0a0718" stroke-width="2.2" fill="none" stroke-linecap="round">
    <path d="M600 130 q7 -8 14 0 q7 -8 14 0"/>
    <path d="M645 112 q6 -7 12 0 q6 -7 12 0"/>
    <path d="M685 140 q5 -6 10 0 q5 -6 10 0"/>
  </g>

  <!-- falling petals -->
  <g>
    <ellipse class="petal fall1" cx="260" cy="30" rx="5" ry="3"/>
    <ellipse class="petal fall2" cx="520" cy="10" rx="4" ry="2.5"/>
    <ellipse class="petal fall3" cx="760" cy="20" rx="5" ry="3"/>
    <ellipse class="petal fall2" cx="1040" cy="0" rx="4" ry="2.5"/>
    <ellipse class="petal fall1" cx="120" cy="0" rx="4" ry="2.5"/>
  </g>

  <!-- text -->
  <text class="name" x="600" y="220" text-anchor="middle">SHIVANG DUTTA</text>
  <text class="sub"  x="600" y="258" text-anchor="middle">AI / ML  •  BUILDER  •  DELHI, INDIA</text>
  <text class="jp"   x="600" y="292" text-anchor="middle">創る者は、強くなる</text>
</svg>
